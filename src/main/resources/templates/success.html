<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #e9f7ef; 
             display: flex; justify-content: center; align-items: center; 
             height: 100vh; margin: 0;">

<div style="background: white; padding: 30px; border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; 
            text-align: center;">

    <h2 style="color: green;">Registration Successful 🎉</h2>

    <p><strong>Name:</strong> 
        <span th:text="${name}" style="color: #333;"></span>
    </p>

    <p><strong>Email:</strong> 
        <span th:text="${email}" style="color: #333;"></span>
    </p>

    <a href="/register"
       style="display: inline-block; margin-top: 15px; 
              padding: 8px 15px; background-color: #007bff; 
              color: white; text-decoration: none; 
              border-radius: 5px;">
        Back
    </a>

</div>

</body>
</html>
