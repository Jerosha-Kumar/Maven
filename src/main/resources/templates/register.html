<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration Form</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6f9; 
             display: flex; justify-content: center; align-items: center; 
             height: 100vh; margin: 0;">

<div style="background: white; padding: 30px; border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px;">

    <h2 style="text-align: center; color: #333;">User Registration</h2>

    <form action="/register" method="post">

        <label style="font-weight: bold;">Name:</label><br>
        <input type="text" name="name" required
               style="width: 100%; padding: 8px; margin-top: 5px; 
                      margin-bottom: 15px; border: 1px solid #ccc; 
                      border-radius: 5px;"><br>

        <label style="font-weight: bold;">Email:</label><br>
        <input type="email" name="email" required
               style="width: 100%; padding: 8px; margin-top: 5px; 
                      margin-bottom: 15px; border: 1px solid #ccc; 
                      border-radius: 5px;"><br>

        <label style="font-weight: bold;">Password:</label><br>
        <input type="password" name="password" required
               style="width: 100%; padding: 8px; margin-top: 5px; 
                      margin-bottom: 20px; border: 1px solid #ccc; 
                      border-radius: 5px;"><br>

        <button type="submit"
                style="width: 100%; padding: 10px; 
                       background-color: #007bff; 
                       color: white; border: none; 
                       border-radius: 5px; 
                       cursor: pointer; font-size: 16px;">
            Register
        </button>

    </form>

</div>

</body>
</html>
